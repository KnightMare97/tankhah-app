<!DOCTYPE html>
<html class="light" dir="rtl" lang="fa">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta content="#131b2e" name="theme-color"/>
<title>مدیریت تنخواه | ورود</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>
<link href="./css/tw.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="./css/app.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center px-margin-mobile">
<div class="w-full max-w-sm flex flex-col items-center">
<!-- Logo -->
<div class="w-20 h-20 rounded-2xl bg-primary-container flex items-center justify-center mb-4 shadow-soft">
<span class="material-symbols-outlined text-secondary-container text-5xl">account_balance_wallet</span>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-secondary mb-1">مدیریت تنخواه</h1>
<p class="font-body-md text-on-surface-variant mb-8">برای ادامه وارد شوید</p>

<form id="login-form" class="w-full flex flex-col gap-md">
<div class="flex flex-col gap-xs text-right">
<label class="font-label-bold text-label-bold text-on-surface-variant px-1">ایمیل</label>
<input id="email" type="email" required dir="ltr" autocomplete="username" class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-xl px-4 font-body-md text-body-md text-on-surface text-left" placeholder="you@example.com"/>
</div>
<div class="flex flex-col gap-xs text-right">
<label class="font-label-bold text-label-bold text-on-surface-variant px-1">رمز عبور</label>
<div class="relative">
<input id="password" type="password" required autocomplete="current-password" class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-xl px-4 font-body-md text-body-md text-on-surface text-right" placeholder="••••••••"/>
<button type="button" id="toggle-pw" class="absolute inset-y-0 left-0 flex items-center pl-4 text-on-surface-variant">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<p id="error" class="text-error font-label-bold text-label-bold text-center hidden"></p>
<button type="submit" id="login-btn" class="w-full h-14 bg-secondary-container text-on-secondary-container rounded-xl font-headline-sm text-headline-sm shadow-md active:scale-[0.98] transition-transform flex items-center justify-center gap-2 mt-2 hover:brightness-110">
ورود
<span class="material-symbols-outlined">login</span>
</button>
</form>
</div>
<script src="./js/common.js"></script>
<script src="./js/supabase.js"></script>
<script src="./js/login.js"></script>
</body>
</html>
