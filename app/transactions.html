<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta content="#131b2e" name="theme-color"/>
<title>مدیریت تنخواه | تراکنش‌ها</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>
<link href="./css/tw.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="./css/app.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen pb-24">
<!-- Top AppBar -->
<header class="w-full top-0 sticky z-50 custom-glass border-b border-outline-variant">
<div class="flex flex-row-reverse justify-between items-center px-margin-mobile h-14 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl">account_balance_wallet</span>
<h1 class="font-headline-sm text-headline-sm text-primary">مدیریت تنخواه</h1>
</div>
</div>
</header>
<main class="px-4 mt-6 max-w-md mx-auto">
<!-- Search & Filter Area -->
<section class="mb-6">
<div class="relative w-full mb-4">
<input id="search" class="w-full h-12 pr-12 pl-4 bg-surface-container-lowest border border-outline-variant rounded-xl focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-all outline-none text-body-md" placeholder="جستجو در تراکنش‌ها..." type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
</div>
<!-- Filter Chips -->
<div class="flex flex-row-reverse gap-2 overflow-x-auto no-scrollbar pb-2" id="filters">
<button data-filter="all" class="filter-chip px-4 py-2 rounded-full bg-primary text-on-primary font-label-bold text-label-bold whitespace-nowrap active:scale-95 transition-transform">همه</button>
<button data-filter="expense" class="filter-chip px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label-bold text-label-bold whitespace-nowrap hover:bg-surface-container-high transition-colors">هزینه‌ها</button>
<button data-filter="income" class="filter-chip px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label-bold text-label-bold whitespace-nowrap hover:bg-surface-container-high transition-colors">شارژها</button>
<button data-filter="debt" class="filter-chip px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label-bold text-label-bold whitespace-nowrap hover:bg-surface-container-high transition-colors">بدهی‌ها</button>
</div>
</section>
<!-- Transaction List Grouped (dynamic) -->
<section class="space-y-8" id="tx-groups">
<div class="skeleton h-20 rounded-lg"></div>
<div class="skeleton h-20 rounded-lg"></div>
<div class="skeleton h-20 rounded-lg"></div>
</section>
</main>
<!-- FAB -->
<a href="./add.html" class="fixed bottom-24 left-6 w-14 h-14 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-all z-40">
<span class="material-symbols-outlined text-3xl">add</span>
</a>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full z-50 h-20 bg-surface-container-lowest border-t border-outline-variant shadow-sm">
<div class="flex flex-row-reverse justify-around items-center w-full px-4 h-full">
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:bg-surface-container-low transition-all active:scale-95 duration-100" href="./index.html">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-bold text-label-bold">داشبورد</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary font-bold gap-1 active:scale-95 duration-100" href="./transactions.html">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-label-bold text-label-bold">تراکنش‌ها</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:bg-surface-container-low transition-all active:scale-95 duration-100" href="./contacts.html">
<span class="material-symbols-outlined">person_search</span>
<span class="font-label-bold text-label-bold">بدهی‌ها</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:bg-surface-container-low transition-all active:scale-95 duration-100" href="./settings.html">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-bold text-label-bold">تنظیمات</span>
</a>
</div>
</nav>
<script src="./js/common.js"></script>
<script src="./js/modal.js"></script>
<script src="./js/supabase.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/transactions.js"></script>
</body>
</html>
