<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta content="#131b2e" name="theme-color"/>
<title>مدیریت تنخواه | ثبت تراکنش</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="./js/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Plus+Jakarta+Sans:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="./css/app.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
</head>
<body class="min-h-screen flex flex-col items-center" style="background:#f6fafe;">
<!-- Top Navigation Bar -->
<header class="w-full top-0 sticky z-50" style="background:#f6fafe;border-bottom:1px solid #dbe3ee;">
<div class="max-w-lg mx-auto flex flex-row-reverse justify-between items-center px-4 h-14 w-full">
<div class="flex items-center gap-2">
<span style="width:34px;height:34px;border-radius:9px;background:#e9f0f8;color:#131b2e;display:flex;align-items:center;justify-content:center;flex:none;"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4H17a1 1 0 0 1 0 2H6.5a.5.5 0 0 0 0 1H19a2 2 0 0 1 2 2v8a2.5 2.5 0 0 1-2.5 2.5h-12A2.5 2.5 0 0 1 2 17V6.5z"/></svg></span>
<h1 id="page-title" style="font-size:18px;font-weight:800;color:#131b2e;">ثبت تراکنش</h1>
</div>
<a href="./transactions.html" style="width:38px;height:38px;border-radius:50%;background:#eef4fb;color:#46506a;display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12 19 6.4 17.6 5 12 10.6z"/></svg></a>
</div>
</header>

<form id="tx-form" class="w-full max-w-lg px-4" style="display:flex;flex-direction:column;gap:17px;padding-top:18px;padding-bottom:215px;" dir="rtl">

<!-- نوع تراکنش (سه‌حالته) -->
<div style="display:flex;flex-direction:column;gap:9px;">
<div style="display:flex;gap:4px;background:#eef2f8;padding:5px;border-radius:8px;">
<button type="button" class="kind-item" data-kind="expense" style="flex:1;padding:11px 4px;border:none;border-radius:6px;font-family:inherit;font-size:14px;cursor:pointer;">هزینه</button>
<button type="button" class="kind-item" data-kind="income" style="flex:1;padding:11px 4px;border:none;border-radius:6px;font-family:inherit;font-size:14px;cursor:pointer;">شارژ</button>
<button type="button" class="kind-item" data-kind="debt" style="flex:1;padding:11px 4px;border:none;border-radius:6px;font-family:inherit;font-size:14px;cursor:pointer;">طلب همکار</button>
</div>
<div style="font-size:12.5px;color:#5b647a;display:flex;align-items:center;gap:7px;"><span style="width:5px;height:5px;border-radius:50%;background:#fea619;flex:none;"></span><span id="kind-hint">پرداخت از صندوق/کارت خودت.</span></div>
</div>

<!-- مبلغ -->
<div>
<div style="font-size:13px;font-weight:700;color:#46506a;margin-bottom:8px;">مبلغ (تومان)</div>
<div style="display:flex;align-items:center;gap:10px;background:#fff;border:2px solid #fea619;border-radius:9px;padding:0 14px;box-shadow:0 6px 16px -8px rgba(254,166,25,.45);">
<span style="color:#fea619;flex:none;display:flex;"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M3 6h18a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1zm9 3a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg></span>
<input id="amount" required inputmode="numeric" enterkeyhint="next" placeholder="۰" dir="ltr" class="currency-font" style="flex:1;border:none;outline:none;background:none;font-family:inherit;font-size:26px;font-weight:800;color:#131b2e;padding:15px 0;text-align:center;min-width:0;"/>
<span style="font-size:14px;font-weight:600;color:#8a93a6;flex:none;">تومان</span>
</div>
<div id="quick-amounts" style="margin-top:11px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
<button type="button" class="quick" data-amount="50000" style="padding:10px 4px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;border:1.5px solid #dbe3ee;background:#fff;color:#46506a;">۵۰ هزار</button>
<button type="button" class="quick" data-amount="100000" style="padding:10px 4px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;border:1.5px solid #dbe3ee;background:#fff;color:#46506a;">۱۰۰ هزار</button>
<button type="button" class="quick" data-amount="200000" style="padding:10px 4px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;border:1.5px solid #dbe3ee;background:#fff;color:#46506a;">۲۰۰ هزار</button>
<button type="button" class="quick" data-amount="500000" style="padding:10px 4px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;border:1.5px solid #dbe3ee;background:#fff;color:#46506a;">۵۰۰ هزار</button>
</div>
</div>

<!-- دسته‌بندی -->
<div id="category-block">
<div style="font-size:13px;font-weight:700;color:#46506a;margin-bottom:8px;">دسته‌بندی</div>
<div style="position:relative;">
<select id="category" style="width:100%;height:48px;background:#fff;border:1.5px solid #dbe3ee;border-radius:9px;padding:0 15px;-webkit-appearance:none;appearance:none;font-family:inherit;font-size:14.5px;color:#131b2e;">
<option disabled selected value="">انتخاب کنید…</option>
<option value="office">امور اداری</option>
<option value="food">خوراک و رستوران</option>
<option value="transport">حمل و نقل</option>
<option value="utilities">قبوض و خدمات</option>
<option value="others">سایر موارد</option>
</select>
<span style="position:absolute;top:0;bottom:0;left:12px;display:flex;align-items:center;pointer-events:none;color:#8a93a6;"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 9l6 6 6-6z"/></svg></span>
</div>
</div>

<!-- کارت / صندوق (انتخابگر افقی) -->
<div id="card-block">
<div id="card-label" style="font-size:13px;font-weight:700;color:#46506a;margin-bottom:8px;">از کدام کارت؟</div>
<div id="card-picker" class="no-scrollbar" style="display:flex;gap:9px;overflow-x:auto;margin:0 -16px;padding:2px 16px;"></div>
</div>

<!-- همکار طلبکار (فقط حالت طلب) -->
<div id="contact-wrapper" class="hidden">
<div style="font-size:13px;font-weight:700;color:#46506a;margin-bottom:8px;">همکار طلبکار</div>
<div style="position:relative;">
<select id="contact-select" style="width:100%;height:48px;background:#fff;border:1.5px solid #dbe3ee;border-radius:9px;padding:0 15px;-webkit-appearance:none;appearance:none;font-family:inherit;font-size:14.5px;color:#131b2e;">
<option value="">انتخاب همکار…</option>
</select>
<span style="position:absolute;top:0;bottom:0;left:12px;display:flex;align-items:center;pointer-events:none;color:#8a93a6;"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 9l6 6 6-6z"/></svg></span>
</div>
</div>

<!-- رسید / فاکتور -->
<div>
<div style="font-size:13px;font-weight:700;color:#46506a;margin-bottom:8px;">تصویر رسید / فاکتور</div>
<div id="drop-zone" style="position:relative;border:2px dashed #fea619;background:rgba(254,166,25,.07);border-radius:9px;padding:22px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;overflow:hidden;">
<input class="hidden" id="file-upload" type="file" accept="image/*,application/pdf"/>
<img id="preview" class="hidden" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" alt="پیش‌نمایش رسید"/>
<span id="upload-icon" style="color:#fea619;display:flex;"><svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M9.2 4h5.6l1.5 2H20a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3.7l1.5-2zM12 9.2a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/></svg></span>
<span id="upload-label" style="font-size:14.5px;font-weight:800;color:#131b2e;">عکس بگیر یا انتخاب کن</span>
<span style="font-size:12px;color:#8a93a6;">دوربین، گالری یا فایل PDF</span>
</div>
</div>

<!-- شرح -->
<div>
<div id="title-label" style="font-size:13px;font-weight:700;color:#46506a;margin-bottom:8px;">شرح یا فروشنده</div>
<input id="title" enterkeyhint="done" placeholder="مثلاً: خرید ملزومات اداری" style="width:100%;height:48px;background:#fff;border:1.5px solid #dbe3ee;border-radius:9px;padding:0 15px;font-family:inherit;font-size:14.5px;color:#131b2e;outline:none;"/>
</div>

<!-- تاریخ -->
<div>
<div style="font-size:13px;font-weight:700;color:#46506a;margin-bottom:8px;">تاریخ تراکنش</div>
<div style="position:relative;">
<input id="date" readonly autocomplete="off" placeholder="انتخاب تاریخ" style="width:100%;height:48px;background:#fff;border:1.5px solid #dbe3ee;border-radius:9px;padding:0 15px;font-family:inherit;font-size:14.5px;color:#131b2e;text-align:right;outline:none;cursor:pointer;"/>
<span style="position:absolute;top:0;bottom:0;left:12px;display:flex;align-items:center;pointer-events:none;color:#8a93a6;"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7 2v2H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2H7zm12 7v10H5V9h14z"/></svg></span>
</div>
</div>

</form>

<!-- دکمه ثبت (چسبیده به پایین) -->
<div class="fixed bottom-20 left-0 right-0 z-40" style="pointer-events:none;">
<div class="max-w-lg mx-auto px-4" style="padding-bottom:12px;padding-top:30px;background:linear-gradient(to top,#f6fafe 72%,rgba(246,250,254,0));pointer-events:auto;">
<button type="submit" form="tx-form" id="submit-btn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:#fea619;color:#131b2e;border:none;border-radius:10px;padding:16px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 10px 20px -8px rgba(254,166,25,.6);">ثبت و تأیید تراکنش <svg viewBox="0 0 24 24" width="21" height="21" fill="currentColor"><path d="M9.6 16.2 5.4 12l-1.4 1.4 5.6 5.6L20.4 7.8 19 6.4z"/></svg></button>
</div>
</div>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full z-50 h-20 bg-surface-container-lowest border-t border-outline-variant flex flex-row-reverse justify-around items-center px-4">
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1" href="./index.html">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-bold text-label-bold">داشبورد</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary font-bold gap-1" href="./transactions.html">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<span class="font-label-bold text-label-bold">تراکنش‌ها</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1" href="./contacts.html">
<span class="material-symbols-outlined">person_search</span>
<span class="font-label-bold text-label-bold">بدهی‌ها</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1" href="./settings.html">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-bold text-label-bold">تنظیمات</span>
</a>
</nav>
<script src="./js/common.js"></script>
<script src="./js/modal.js"></script>
<script src="./js/jdate.js"></script>
<script src="./js/jalali-picker.js"></script>
<script src="./js/supabase.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/add.js"></script>
</body>
</html>
