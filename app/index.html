<!DOCTYPE html>
<html class="light" dir="rtl" lang="fa">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta content="#131b2e" name="theme-color"/>
<title>مدیریت تنخواه | داشبورد</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="./js/theme.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="./css/app.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
</head>
<body class="bg-background text-on-surface min-h-screen pb-24">
<!-- Top App Bar -->
<header class="w-full top-0 sticky bg-background border-b border-outline-variant z-50">
<div class="flex flex-row-reverse justify-between items-center px-margin-mobile h-14 w-full">
<div class="flex items-center gap-3">
<span class="font-headline-md text-headline-md font-bold text-secondary">مدیریت تنخواه</span>
</div>
<div class="flex items-center">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:opacity-80">
<span class="material-symbols-outlined text-primary">account_balance_wallet</span>
</button>
</div>
</div>
</header>
<main class="max-w-md mx-auto px-4 pt-4 flex flex-col gap-[18px]" dir="rtl">

<!-- موجودی کل تنخواه -->
<div style="position:relative;overflow:hidden;background:#131b2e;border-radius:14px;padding:22px;box-shadow:0 14px 30px -12px rgba(19,27,46,.5);">
<div style="position:absolute;top:-40px;left:-30px;width:150px;height:150px;border-radius:50%;background:rgba(254,166,25,.10);"></div>
<div style="position:absolute;bottom:-60px;left:40px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04);"></div>
<div style="position:relative;display:flex;align-items:center;justify-content:space-between;">
<span style="font-size:13px;font-weight:600;color:#8a93a6;letter-spacing:.05em;">موجودی کل تنخواه</span>
<span style="width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#fea619;"><svg viewBox="0 0 24 24" width="19" height="19" fill="currentColor"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4H17a1 1 0 0 1 0 2H6.5a.5.5 0 0 0 0 1H19a2 2 0 0 1 2 2v8a2.5 2.5 0 0 1-2.5 2.5h-12A2.5 2.5 0 0 1 2 17V6.5z"/></svg></span>
</div>
<div style="position:relative;margin-top:14px;display:flex;align-items:baseline;gap:8px;">
<span id="balance" class="currency-font" style="font-size:36px;font-weight:800;line-height:1;color:#fff;letter-spacing:-.02em;">—</span>
<span style="font-size:15px;font-weight:600;color:#8a93a6;">تومان</span>
</div>
<div style="position:relative;margin-top:16px;display:flex;align-items:center;gap:9px;">
<span style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:#d7f0e0;background:rgba(21,122,74,.32);padding:4px 10px;border-radius:999px;font-weight:700;"><svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M9.6 16.2 5.4 12l-1.4 1.4 5.6 5.6L20.4 7.8 19 6.4z"/></svg>همگام شد</span>
<span id="card-count" style="font-size:12px;color:#8a93a6;">—</span>
</div>
</div>

<!-- دو کارت آماری -->
<div style="display:flex;gap:13px;">
<div style="flex:1;background:#fff;border:1px solid #dbe3ee;border-radius:10px;box-shadow:0 1px 2px rgba(19,27,46,.06);padding:15px;display:flex;flex-direction:column;gap:11px;">
<span style="width:38px;height:38px;border-radius:9px;background:#e9f0f8;color:#131b2e;display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M9 2h6a1.5 1.5 0 0 1 1.5 1.5V4H18a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1.5v-.5A1.5 1.5 0 0 1 9 2zm0 2v1.5h6V4H9z"/></svg></span>
<div>
<div style="font-size:12.5px;color:#5b647a;font-weight:600;">مجموع بدهی</div>
<div style="margin-top:4px;display:flex;align-items:baseline;gap:4px;"><span id="total-debt" class="currency-font" style="font-size:19px;font-weight:800;color:#131b2e;">—</span><span style="font-size:11.5px;color:#8a93a6;">تومان</span></div>
<div id="debt-sub" style="margin-top:5px;font-size:11px;color:#c47a00;font-weight:700;">—</div>
</div>
</div>
<div style="flex:1;background:#fff;border:1px solid #dbe3ee;border-radius:10px;box-shadow:0 1px 2px rgba(19,27,46,.06);padding:15px;display:flex;flex-direction:column;gap:11px;">
<span style="width:38px;height:38px;border-radius:9px;background:#fdeaea;color:#ba1a1a;display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M11 3h2v12.2l4.3-4.3 1.4 1.4L12 19 5.3 12.3l1.4-1.4L11 15.2z"/></svg></span>
<div>
<div style="font-size:12.5px;color:#5b647a;font-weight:600;">کل هزینه‌ها</div>
<div style="margin-top:4px;display:flex;align-items:baseline;gap:4px;"><span id="total-expenses" class="currency-font" style="font-size:19px;font-weight:800;color:#ba1a1a;">—</span><span style="font-size:11.5px;color:#8a93a6;">تومان</span></div>
<div style="margin-top:5px;font-size:11px;color:#8a93a6;font-weight:700;">همه‌ی دوره‌ها</div>
</div>
</div>
</div>

<!-- کارت‌ها و صندوق -->
<section id="accounts-section" style="display:none;">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
<span style="font-size:16px;font-weight:800;color:#131b2e;">کارت‌ها و صندوق</span>
<a href="./settings.html" style="font-size:13px;font-weight:700;color:#c47a00;text-decoration:none;">مدیریت</a>
</div>
<div id="accounts-strip" class="no-scrollbar" style="display:flex;gap:12px;overflow-x:auto;margin:0 -16px;padding:2px 16px 6px;"></div>
</section>

<!-- دکمه‌های اقدام -->
<div style="display:flex;gap:12px;">
<a href="./add.html" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:#fea619;color:#131b2e;border-radius:10px;padding:15px 8px;font-size:15px;font-weight:800;text-decoration:none;box-shadow:0 8px 18px -6px rgba(254,166,25,.6);"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10.7 4h2.6v6.7H20v2.6h-6.7V20h-2.6v-6.7H4v-2.6h6.7z"/></svg>ثبت هزینه</a>
<a href="./add.html?type=income" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;color:#131b2e;border:1px solid #ccd6e3;border-radius:10px;padding:15px 8px;font-size:15px;font-weight:800;text-decoration:none;"><svg viewBox="0 0 24 24" width="19" height="19" fill="currentColor"><path d="M11 3h2v8.2l2.6-2.6 1.4 1.4L12 15.4 6.99 10.4l1.4-1.4L11 11.6z"/><path d="M4 17h16v3.2H4z"/></svg>درخواست شارژ</a>
</div>

<!-- اقدامات لازم -->
<div>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
<span style="font-size:16px;font-weight:800;color:#131b2e;">اقدامات لازم</span>
<a href="./transactions.html" style="font-size:13px;font-weight:700;color:#c47a00;text-decoration:none;">مشاهده همه</a>
</div>
<div id="actions-list" style="display:flex;flex-direction:column;gap:10px;"></div>
</div>

<!-- نمودار خرج‌کرد (میله‌ای + سه تب زمانی) -->
<div style="background:#0f1626;border-radius:12px;padding:18px 18px 16px;box-shadow:0 14px 30px -14px rgba(19,27,46,.5);">
<div style="display:flex;align-items:flex-start;justify-content:space-between;">
<div style="display:flex;flex-direction:column;gap:4px;">
<span style="font-size:14.5px;font-weight:800;color:#fff;">خرج‌کرد</span>
<span id="chart-total" style="font-size:11.5px;color:#9aa6b8;">—</span>
</div>
<span style="width:36px;height:36px;border-radius:10px;background:rgba(254,166,25,.16);color:#fea619;display:flex;align-items:center;justify-content:center;flex:none;"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><rect x="3" y="12" width="4" height="8" rx="1.3"/><rect x="10" y="6" width="4" height="14" rx="1.3"/><rect x="17" y="9" width="4" height="11" rx="1.3"/></svg></span>
</div>
<div id="chart-tabs" style="margin-top:14px;display:flex;gap:4px;background:rgba(255,255,255,.06);padding:4px;border-radius:8px;">
<button type="button" data-range="7d" style="flex:1;padding:9px 4px;border:none;border-radius:6px;font-family:inherit;font-size:12.5px;font-weight:800;cursor:pointer;">۷ روز اخیر</button>
<button type="button" data-range="1m" style="flex:1;padding:9px 4px;border:none;border-radius:6px;font-family:inherit;font-size:12.5px;font-weight:800;cursor:pointer;">ماه اخیر</button>
<button type="button" data-range="3m" style="flex:1;padding:9px 4px;border:none;border-radius:6px;font-family:inherit;font-size:12.5px;font-weight:800;cursor:pointer;">۳ ماه اخیر</button>
</div>
<div id="chart-bars" style="margin-top:17px;display:flex;align-items:flex-end;gap:9px;height:124px;"></div>
<div id="chart-labels" style="margin-top:10px;display:flex;gap:9px;"></div>
</div>

</main>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 w-full z-50 h-20 bg-surface-container-lowest border-t border-outline-variant shadow-sm">
<div class="flex flex-row-reverse justify-around items-center w-full px-4 h-full">
<a class="flex flex-col items-center justify-center text-secondary font-bold gap-1 active:scale-95 duration-100" href="./index.html">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-label-bold text-label-bold">داشبورد</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:bg-surface-container-low transition-all active:scale-95 duration-100" href="./transactions.html">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-label-bold text-label-bold">تراکنش‌ها</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:bg-surface-container-low transition-all active:scale-95 duration-100" href="./contacts.html">
<span class="material-symbols-outlined">person_search</span>
<span class="font-label-bold text-label-bold">بدهی‌ها</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:bg-surface-container-low transition-all active:scale-95 duration-100" href="./settings.html">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-bold text-label-bold">تنظیمات</span>
</a>
</div>
</nav>
<script src="./js/common.js"></script>
<script src="./js/supabase.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/dashboard.js"></script>
</body>
</html>
