<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" name="viewport"/>
<meta content="#131b2e" name="theme-color"/>
<title>مدیریت تنخواه | بدهی‌ها</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>
<link href="./css/tw.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="./css/app.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen pb-24">
<!-- Top AppBar -->
<header class="w-full top-0 sticky z-50 custom-glass border-b border-outline-variant">
<div class="flex flex-row-reverse justify-between items-center px-margin-mobile h-14 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl">person_search</span>
<h1 class="font-headline-sm text-headline-sm text-primary">بدهی‌ها و همکاران</h1>
</div>
<button id="add-contact-btn" class="p-2 hover:bg-surface-container-low transition-colors rounded-full active:opacity-80">
<span class="material-symbols-outlined">person_add</span>
</button>
</div>
</header>
<main class="px-4 pt-4 max-w-md mx-auto" dir="rtl">
<!-- مجموع طلب همکاران -->
<div style="position:relative;overflow:hidden;background:#131b2e;border-radius:14px;padding:22px;box-shadow:0 14px 30px -12px rgba(19,27,46,.5);margin-bottom:20px;">
<div style="position:absolute;top:-40px;left:-30px;width:150px;height:150px;border-radius:50%;background:rgba(254,166,25,.10);"></div>
<div style="position:relative;display:flex;align-items:center;justify-content:space-between;">
<span style="font-size:13px;font-weight:600;color:#8a93a6;letter-spacing:.05em;">مجموع طلب همکاران</span>
<span style="width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#fea619;"><svg viewBox="0 0 24 24" width="19" height="19" fill="currentColor"><path d="M9 2h6a1.5 1.5 0 0 1 1.5 1.5V4H18a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1.5v-.5A1.5 1.5 0 0 1 9 2zm0 2v1.5h6V4H9z"/></svg></span>
</div>
<div style="position:relative;margin-top:14px;display:flex;align-items:baseline;gap:8px;">
<span id="total-debt" class="currency-font" style="font-size:34px;font-weight:800;color:#fff;letter-spacing:-.02em;">—</span>
<span style="font-size:15px;font-weight:600;color:#8a93a6;">تومان</span>
</div>
</div>
<!-- لیست همکاران -->
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
<span style="font-size:16px;font-weight:800;color:#131b2e;">لیست همکاران</span>
</div>
<div style="display:flex;flex-direction:column;gap:10px;" id="contacts-list">
<div class="skeleton h-20 rounded-lg"></div>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full z-50 h-20 bg-surface-container-lowest border-t border-outline-variant shadow-sm">
<div class="flex flex-row-reverse justify-around items-center w-full px-4 h-full">
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:bg-surface-container-low transition-all active:scale-95 duration-100" href="./index.html">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-bold text-label-bold">داشبورد</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:bg-surface-container-low transition-all active:scale-95 duration-100" href="./transactions.html">
<span class="material-symbols-outlined">receipt_long</span>
<span class="font-label-bold text-label-bold">تراکنش‌ها</span>
</a>
<a class="flex flex-col items-center justify-center text-secondary font-bold gap-1 active:scale-95 duration-100" href="./contacts.html">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person_search</span>
<span class="font-label-bold text-label-bold">بدهی‌ها</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant gap-1 hover:bg-surface-container-low transition-all active:scale-95 duration-100" href="./settings.html">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-bold text-label-bold">تنظیمات</span>
</a>
</div>
</nav>
<script src="./js/common.js"></script>
<script src="./js/modal.js"></script>
<script src="./js/supabase.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/contacts.js"></script>
</body>
</html>
