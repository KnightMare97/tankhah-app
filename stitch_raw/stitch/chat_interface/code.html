<div class="flex flex-col items-start gap-1">

<div class="h-4"></div>

<!-- Fixed Bottom Input Area -->
<div class="fixed bottom-0 left-0 w-full bg-white bg-opacity-95 backdrop-blur-sm border-t-thick p-3 pb-safe pt-2 flex flex-col gap-3 z-50">
<!-- Quick Actions Row -->

<button class="whitespace-nowrap bg-surface-gray hover:bg-gray-200 text-text-dark text-sm font-bold py-2 px-4 rounded-full border-thick shadow-[1px_1px_0px_0px_#09090b] transition-transform active:translate-y-[1px] active:shadow-none">

<button class="whitespace-nowrap bg-surface-gray hover:bg-gray-200 text-text-dark text-sm font-bold py-2 px-4 rounded-full border-thick shadow-[1px_1px_0px_0px_#09090b] transition-transform active:translate-y-[1px] active:shadow-none">
        Export
      </button>
<button class="whitespace-nowrap bg-surface-gray hover:bg-gray-200 text-text-dark text-sm font-bold py-2 px-4 rounded-full border-thick shadow-[1px_1px_0px_0px_#09090b] transition-transform active:translate-y-[1px] active:shadow-none">
        Latest Expenses
      </button>
</div>
<!-- Main Input Pill -->
<div class="flex items-center gap-2 bg-surface-gray border-thick rounded-full p-1 shadow-[2px_2px_0px_0px_#09090b] focus-within:ring-2 focus-within:ring-primary focus-within:ring-offset-2 transition-all">
<!-- Camera Button -->
<button aria-label="Scan Receipt" class="flex items-center justify-center w-12 h-12 rounded-full bg-white border-thick hover:bg-gray-100 transition-colors shrink-0">
<span class="material-symbols-outlined text-text-dark">photo_camera</span>
</button>
<!-- Text Input -->
<input class="flex-1 bg-transparent border-none text-text-dark font-semibold text-base placeholder-gray-500 focus:ring-0 px-2 h-12" placeholder="Type an expense..." type="text"/>
<!-- Send Button -->
<button aria-label="Send Message" class="flex items-center justify-center w-12 h-12 rounded-full bg-primary border-thick hover:bg-yellow-400 active:bg-yellow-500 transition-colors shrink-0">
<span class="material-symbols-outlined text-text-dark font-bold" style="font-variation-settings: 'FILL' 1;">arrow_upward</span>
</button>
</div>
</div>
<script>
    // Simple script to auto-scroll to bottom on load
    document.addEventListener("DOMContentLoaded", () => {
      const feed = document.getElementById('chat-feed');
      feed.scrollTop = feed.scrollHeight;
      
      // Optional: Handle visual keyboard dismissal by swiping down (conceptual)
      let touchstartY = 0;
      let touchendY = 0;
      
      feed.addEventListener('touchstart', e => {
        touchstartY = e.changedTouches[0].screenY;
      }, {passive: true});
      
      feed.addEventListener('touchend', e => {
        touchendY = e.changedTouches[0].screenY;
        if (touchendY - touchstartY > 50) {
          // Swipe down detected, blur inputs
          document.activeElement.blur();
        }
      }, {passive: true});
    });
  </script>
</body></html>
